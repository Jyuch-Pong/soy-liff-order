<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>司機配送</title>
<style>
  :root {
    --bg:#17181a; --card:#1f2123; --border:#34383b; --text:#EDEDEB;
    --text2:#9a9d9c; --text3:#787c7a; --green:#10b981; --green-d:#059669;
    --amber:#f59e0b; --red:#f43f5e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,"Noto Sans TC",sans-serif;font-size:14px;padding-bottom:20px}
  .topbar{background:var(--green-d);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:10}
  .topbar .name{font-weight:700;font-size:15px}
  .topbar .sub{font-size:12px;opacity:.85;margin-top:2px}
  .bar2{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  input,select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:14px}
  input[type=date]{color-scheme:dark}
  .wrap{padding:12px;max-width:560px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
  .scard{border-radius:12px;border:2px solid;padding:12px;margin-bottom:10px}
  .s-green{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.45)}
  .s-red{background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.45)}
  .s-done{background:rgba(16,185,129,.04);border-color:rgba(16,185,129,.2);opacity:.75}
  .mono{font-family:monospace}
  .green{color:var(--green)} .amber{color:var(--amber)} .red{color:var(--red)} .dim{color:var(--text3)}
  .badge{font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid;white-space:nowrap}
  .b-green{color:var(--green);border-color:var(--green)}
  .b-red{color:var(--red);border-color:var(--red)}
  .b-amber{color:var(--amber);border-color:var(--amber)}
  .b-blue{color:#60a5fa;border-color:#60a5fa}
  button.btn{background:var(--green-d);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600}
  button.btn-red{background:var(--red);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600}
  button.btn2{background:none;color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px}
  .full{width:100%}
  .login{max-width:300px;margin:110px auto;text-align:center}
  .login input{width:100%;margin:8px 0;padding:11px}
  .login button{width:100%;padding:11px;margin-top:8px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--text2);text-align:left;font-weight:500;padding:5px 6px;border-bottom:1px solid var(--border)}
  td{padding:6px;border-bottom:1px solid #2a2d30}
  tr:last-child td{border-bottom:none}
  .oitem{font-size:12px;color:var(--text2);display:flex;justify-content:space-between;padding:2px 0}
  .qtyrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
  .qtyrow .ctrl{display:flex;align-items:center;gap:10px}
  .qtyrow button{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px}
  .qtyrow button.p{background:var(--green-d);border-color:var(--green-d);color:#fff}
  .qtyrow .n{min-width:22px;text-align:center;font-family:monospace}
  details summary{cursor:pointer;padding:4px 0}
  .addr{font-size:12px;color:var(--text2);margin-top:2px}
  .rowbtns{display:flex;gap:8px;margin-top:10px}
  .rowbtns button{flex:1}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ====== 設定 ======
const API = "https://whwhufkehoxgrrwacqjv.supabase.co/functions/v1/driver-api";

let CRED = JSON.parse(sessionStorage.getItem("driverCred")||"null"); // {account,password,name,car_no}
let viewDate = todayTW();
let data = null;        // today回傳的資料
let builder = null;     // {storeId, mode:'new'|'addon', orderId?, cart:{}}

const app = document.getElementById("app");

function todayTW(){ return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Taipei"}); }
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function weekdayTW(dateStr){
  return new Intl.DateTimeFormat("zh-TW",{timeZone:"Asia/Taipei",weekday:"short"}).format(new Date(dateStr+"T12:00:00+08:00"));
}

async function api(action, opts={}){
  const url = new URL(API);
  url.searchParams.set("action", action);
  for (const [k,v] of Object.entries(opts.params||{})) url.searchParams.set(k,v);
  const res = await fetch(url, {
    method: opts.body||action==="login" ? "POST":"GET",
    headers: {
      "x-driver-account": CRED?.account||"",
      "x-driver-password": CRED?.password||"",
      ...(opts.body?{"Content-Type":"application/json"}:{}),
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const d = await res.json();
  if (res.status===401 && action!=="login"){ logout(); throw new Error("unauthorized"); }
  if (!res.ok) throw new Error(d.error||"error");
  return d;
}

// ====== 登入 ======
function renderLogin(msg){
  app.innerHTML = `
    <div class="login">
      <h2>🚚 司機配送系統</h2>
      ${msg?`<div class="red" style="margin-top:8px">${esc(msg)}</div>`:""}
      <input id="acc" placeholder="帳號" autocomplete="username" />
      <input id="pw" type="password" placeholder="密碼" autocomplete="current-password" />
      <button class="btn" onclick="doLogin()">登入</button>
    </div>`;
  document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
}
window.doLogin = async function(){
  const account = document.getElementById("acc").value.trim();
  const password = document.getElementById("pw").value;
  CRED = { account, password };
  try {
    const r = await api("login",{body:{}});
    CRED.name = r.driver.name; CRED.car_no = r.driver.car_no;
    sessionStorage.setItem("driverCred", JSON.stringify(CRED));
    load();
  } catch(e){ CRED=null; renderLogin(e.message==="unauthorized"?"帳號或密碼錯誤":e.message); }
};
function logout(){ CRED=null; sessionStorage.removeItem("driverCred"); renderLogin(); }
window.logout = logout;

// ====== 主畫面 ======
async function load(){
  app.innerHTML = `<div class="wrap dim">載入中…</div>`;
  try {
    data = await api("today",{params:{date:viewDate}});
    render();
  } catch(e){
    if (String(e.message)!=="unauthorized")
      app.innerHTML = `<div class="wrap red">載入失敗:${esc(e.message)}</div>`;
  }
}

function render(){
  const done = data.stores.filter(s=>s.order).length;
  app.innerHTML = `
    <div class="topbar">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="name">🚚 ${esc(CRED.name)} <span style="font-weight:400;font-size:12px;opacity:.85">${esc(CRED.car_no||"")}</span></div>
          <div class="sub">${viewDate}(${weekdayTW(viewDate)}) · 路線 ${data.routes.join("、")||"無"} · 梯次 ${esc(data.dayGroup||"-")}</div>
        </div>
        <button class="btn2" style="color:#fff;border-color:rgba(255,255,255,.4)" onclick="logout()">登出</button>
      </div>
    </div>
    <div class="bar2">
      <input type="date" value="${viewDate}" onchange="chgDate(this.value)" />
      <span class="green" style="font-weight:700">${done}/${data.stores.length} 已下單</span>
    </div>
    <div class="wrap">
      ${renderTotals()}
      ${(data.extraStores&&data.extraStores.length)?`
        <div class="card" style="border-color:var(--amber)">
          <b class="amber">⚠️ 非配送日訂單(${data.extraStores.length})</b>
          <div class="dim" style="font-size:12px;margin:4px 0 8px">這些店家今天不是他們的配送梯次,但有指定今天配送的訂單,請記得送</div>
          ${data.extraStores.map(s=>renderStore(s,true)).join("")}
        </div>`:""}
      ${data.stores.length===0?'<div class="card dim">此日期無配送店家</div>':""}
      ${data.stores.map(s=>renderStore(s,false)).join("")}
    </div>`;
}

function renderTotals(){
  if (!data.totals.length) return "";
  return `
    <div class="card">
      <details open>
        <summary><b>📦 當日品項總計</b></summary>
        <table style="margin-top:6px">
          <tr><th>品項</th><th style="text-align:right">總數量</th><th style="text-align:right">下單店數</th></tr>
          ${data.totals.map(t=>`<tr>
            <td>${esc(t.name)}</td>
            <td style="text-align:right" class="mono green"><b>${t.qty}</b> <span class="dim">${esc(t.unit)}</span></td>
            <td style="text-align:right" class="mono dim">${t.storeCount}</td>
          </tr>`).join("")}
        </table>
      </details>
    </div>`;
}

function renderStore(s, isExtra){
  const ordered = !!s.order;
  const delivered = ordered && s.order.status==="delivered";
  const cls = delivered ? "s-done" : ordered ? "s-green" : "s-red";
  const isBuilding = builder && builder.storeId===s.id;
  return `
    <div class="scard ${cls}" ${isExtra?'style="border-style:dashed"':""}>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div>
          <span class="mono dim" style="font-size:11px;font-weight:700">${esc(s.store_code)}</span>
          <b style="margin-left:4px">${esc(s.name)}</b>
          ${isExtra?`<span class="badge b-amber" style="margin-left:4px">梯次 ${esc(s.day_group||"?")}</span>`:""}
          <div class="addr">📍 ${esc(s.address||"")}</div>
        </div>
        ${delivered?'<span class="badge b-blue">✓ 已送達</span>'
          :ordered?'<span class="badge b-green">已訂貨</span>'
          :'<span class="badge b-red">未訂貨</span>'}
      </div>

      ${ordered ? `
        <details style="margin-top:8px">
          <summary style="display:flex;justify-content:space-between">
            <span class="dim" style="font-size:12px">訂貨明細 ${s.order.source==='on_site'?'<span class="badge b-amber">現場建單</span>':""}</span>
            <b>$${s.order.total.toLocaleString()}</b>
          </summary>
          <div style="margin-top:6px">
            ${s.order.items.map(it=>`<div class="oitem"><span>${esc(it.name)}</span><span class="mono">${it.qty} × $${it.price}</span></div>`).join("")}
          </div>
        </details>
        ${!isBuilding ? `
          <div class="rowbtns">
            ${!delivered?`<button class="btn2" onclick="openBuilder('${s.id}','addon','${s.order.id}')">＋ 現場追加</button>`:""}
            ${!delivered?`<button class="btn" onclick="markDelivered('${s.order.id}')">✓ 送達</button>`:""}
          </div>`:""}
      ` : `
        ${!isBuilding?`<button class="btn-red full" style="margin-top:10px" onclick="openBuilder('${s.id}','new')">現場快速建單</button>`:""}
      `}

      ${isBuilding ? renderBuilder(s) : ""}
    </div>`;
}

function renderBuilder(s){
  return `
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      <b style="font-size:13px">${builder.mode==='addon'?'追加品項':'建立訂單'}</b>
      ${data.products.map(p=>{
        const q = builder.cart[p.id]||0;
        return `<div class="qtyrow">
          <span style="font-size:13px">${esc(p.name)} <span class="dim" style="font-size:11px">${esc(p.unit)}</span></span>
          <div class="ctrl">
            <button onclick="chgQty('${p.id}',-1)">−</button>
            <span class="n">${q}</span>
            <button class="p" onclick="chgQty('${p.id}',1)">＋</button>
          </div>
        </div>`}).join("")}
      <div class="rowbtns">
        <button class="btn2" onclick="closeBuilder()">取消</button>
        <button class="btn" onclick="submitBuilder()">${builder.mode==='addon'?'確認追加':'建立訂單'}</button>
      </div>
    </div>`;
}

// ====== 操作 ======
window.chgDate = (v)=>{ viewDate=v; builder=null; load(); };
window.openBuilder = (storeId,mode,orderId)=>{ builder={storeId,mode,orderId,cart:{}}; render(); };
window.closeBuilder = ()=>{ builder=null; render(); };
window.chgQty = (pid,d)=>{ builder.cart[pid]=Math.max(0,(builder.cart[pid]||0)+d); render(); };

window.submitBuilder = async ()=>{
  const items = Object.entries(builder.cart).filter(([,q])=>q>0).map(([productId,qty])=>({productId,qty}));
  if (!items.length) return alert("請選擇品項");
  try {
    if (builder.mode==="new"){
      await api("create_onsite",{body:{storeId:builder.storeId,date:viewDate,items}});
    } else {
      await api("addon",{body:{orderId:builder.orderId,storeId:builder.storeId,items}});
    }
    builder=null;
    load();
  } catch(e){ alert(e.message); }
};

window.markDelivered = async (orderId)=>{
  if (!confirm("確認此店已送達?")) return;
  try { await api("mark_delivered",{body:{orderId}}); load(); } catch(e){ alert(e.message); }
};

// ====== 啟動 ======
if (CRED) load(); else renderLogin();
</script>
</body>
</html>
